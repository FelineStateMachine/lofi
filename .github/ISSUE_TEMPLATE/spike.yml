name: Spike
description: A time-boxed experiment that must end in an explicit decision
labels: ["type: spike"]
body:
  - type: input
    id: question
    attributes:
      label: Question
      description: The falsifiable choice or platform claim this spike resolves.
      placeholder: Does Jazz 2 OPFS persistence survive process kill on iOS Safari 16.4?
    validations:
      required: true
  - type: input
    id: contract-ids
    attributes:
      label: Contract IDs
      description: Promises from docs/devx-contract.md this spike exercises.
      placeholder: DX-DUR-01, DX-ERROR-01
    validations:
      required: true
  - type: textarea
    id: control
    attributes:
      label: Control
      description: The smallest vendor-supported baseline the experiment is compared against.
    validations:
      required: true
  - type: textarea
    id: kill-criteria
    attributes:
      label: Decision / kill criteria
      description: What result adopts, revises, defers, or rejects — decided before running.
    validations:
      required: true
  - type: textarea
    id: evidence-plan
    attributes:
      label: Evidence plan
      description: >-
        What will be retained (paths, measurements, device logs/screenshots, commit SHA) so someone
        else can repeat it. A demo rendering once is not evidence.
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Timebox
      placeholder: 2 days
    validations:
      required: true
