name: Generated app release gate

on:
  pull_request:
    branches:
      - dev

concurrency:
  group: generated-app-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Formatting, lint, and unit/integration tests
        run: deno task check

      - name: Reference production build
        run: deno task build --cwd apps/reference

      - name: Publish dry run
        run: deno task publish:dry --allow-dirty

      - name: Install Chromium
        run: deno task test:browser:install

      - name: Generated-app golden journey (local workspace package)
        run: deno task test:golden

      - name: Retain sanitized golden failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-app-golden-failure
          path: test-results/golden/
          if-no-files-found: ignore
          retention-days: 7
