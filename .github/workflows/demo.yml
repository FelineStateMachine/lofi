name: Demo deploy

# Deploys demo.lofi.host: the starter app generated by the real `create`
# command from the exact published JSR version, with the checked-in demo
# overlay (apps/demo/overlay) applied before the build. Runs after each
# successful publish; the dispatch input redeploys any published version
# without cutting a release.

on:
  workflow_run:
    workflows: ["Publish to JSR"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Published @nzip/lofi version (e.g. 0.8.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # the Cloudflare credentials live as secrets on the `dev` environment; a job
    # must declare that environment for them to resolve
    environment:
      name: dev
      url: https://demo.lofi.host
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # A tag-triggered publish run reports its tag as head_branch.
      - name: Resolve released version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="$DISPATCH_VERSION"
          else
            version="${RUN_HEAD_BRANCH#v}"
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::cannot resolve a release version from '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for JSR availability
        run: |
          v="${{ steps.version.outputs.version }}"
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 10 https://jsr.io/@nzip/lofi/meta.json \
              | jq -e --arg v "$v" '.versions[$v]' > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::@nzip/lofi@$v is not visible on JSR"
          exit 1

      # Generated outside the checkout so the repository import map cannot
      # shadow the published package.
      - name: Generate the demo app from the published package
        working-directory: ${{ runner.temp }}
        run: |
          deno run -A --minimum-dependency-age=0 \
            "jsr:@nzip/lofi@${{ steps.version.outputs.version }}/create" demo-app

      - name: Apply the demo overlay
        run: |
          deno run -A tools/demo_overlay.ts \
            --app "${{ runner.temp }}/demo-app" \
            --version "${{ steps.version.outputs.version }}"

      # The publish quarantine also applies to the generated project's own
      # dependency resolution; prime the cache the way tools/golden.ts does.
      - name: Prime the registry cache
        working-directory: ${{ runner.temp }}/demo-app
        run: |
          jq -r '.imports | to_entries[]
                 | select(.key == "@nzip/lofi" or (.key | startswith("@nzip/lofi/")))
                 | select(.key | endswith("/") | not) | .value' deno.json \
            | sort -u | xargs deno cache --minimum-dependency-age=0

      - name: Doctor
        working-directory: ${{ runner.temp }}/demo-app
        run: deno task doctor

      - name: Build
        working-directory: ${{ runner.temp }}/demo-app
        run: deno task build

      # Pages consumes _headers, so the CSP the build documents in
      # _headers.example ships as a real response header on the demo.
      - name: Promote the CSP header snippet
        working-directory: ${{ runner.temp }}/demo-app
        run: |
          if [ -f dist/_headers.example ]; then
            cp dist/_headers.example dist/_headers
          fi

      # wrangler runs via npx (npm cache) rather than wrangler-action: the action
      # installs wrangler with `npm i` into the checkout, and npm cannot graft
      # onto the Deno-managed node_modules layout at the repo root.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! npx --yes wrangler@4 pages project list | grep -q "demo-lofi-host"; then
            npx --yes wrangler@4 pages project create demo-lofi-host --production-branch=main
          fi
          npx --yes wrangler@4 pages deploy "${{ runner.temp }}/demo-app/dist" \
            --project-name=demo-lofi-host --branch=main
