name: M2 layer 1

on:
  pull_request:
    branches: [m2]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m2-layer1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  reference-golden-path:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.0
      - name: Install pinned Chromium
        run: deno run -A npm:playwright@1.61.1 install --with-deps chromium
      - name: Prove the Deno-only command surface
        shell: bash
        run: |
          sentinel="$(mktemp -d)"
          printf '#!/bin/sh\necho "unexpected Node command: $*" >&2\nexit 97\n' > "$sentinel/node"
          chmod +x "$sentinel/node"
          export PATH="$sentinel:$PATH"
          deno task check
          deno task test
          deno task test:golden:checkout
      - name: Upload golden-path failure evidence
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: m2-layer1-golden-path-${{ github.run_attempt }}
          path: test-results/golden-path/
          if-no-files-found: warn
          retention-days: 7
