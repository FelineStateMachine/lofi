name: Publish to JSR

# Tag a release (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to publish
# @nzip/lofi to JSR. The tag version must match the "version" in deno.json.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC authentication
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify tag matches deno.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v$tag does not match deno.json version $manifest"
            exit 1
          fi

      - name: Formatting, lint, and unit/integration tests
        run: deno task check

      - name: Reference production build
        run: deno task build --cwd apps/reference

      - name: Publish dry run
        run: deno task publish:dry --allow-dirty

      - name: Install Chromium
        run: deno task test:browser:install

      - name: Reset incidental workspace changes from validation steps
        # the reference build and test runs regenerate lockfiles in the
        # runner's checkout; publishing must see exactly the tagged tree
        run: |
          git status --short
          git checkout -- .

      - name: Publish to JSR
        run: deno publish

      - name: Generated-app golden journey (exact published version)
        run: |
          version="${GITHUB_REF_NAME#v}"
          deno run -A tools/golden.ts --source registry --version "$version"

      - name: Retain sanitized golden failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-app-registry-golden-failure
          path: test-results/golden/
          if-no-files-found: ignore
          retention-days: 7
