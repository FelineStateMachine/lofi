name: Docs site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "package/**"
      - "tools/api_docs.ts"
      - "tools/site_llms.ts"
      - "tools/entrypoints.ts"
      - "deno.json"
      - ".github/workflows/site.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Generate API reference from JSDoc
        run: deno task site:api
      - name: Generate llms.txt and llms-full.txt
        run: deno task site:llms
      - name: Install site dependencies
        run: npm ci --prefix website
      - name: Build site (fails on broken links)
        run: npm run build --prefix website
      # wrangler runs via npx (npm cache) rather than wrangler-action: the action
      # installs wrangler with `npm i` into the checkout, and npm cannot graft
      # onto the Deno-managed node_modules layout at the repo root.
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages project create lofi-host --production-branch=main || true
          npx --yes wrangler@4 pages deploy website/build --project-name=lofi-host
