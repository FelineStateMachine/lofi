name: Docs site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "package/**"
      - "tools/api_docs.ts"
      - "tools/site_llms.ts"
      - "tools/node_docs.ts"
      - "tools/entrypoints.ts"
      - "deno.json"
      - ".github/workflows/site.yml"

permissions:
  contents: read

# The /node section renders from a PINNED lofi-node checkout so site builds are
# reproducible; content changes there ride an explicit bump of this ref.
# Bump procedure: point LOFI_NODE_REF at the new lofi-node commit SHA in the
# same PR that reviews the resulting /node pages.
env:
  LOFI_NODE_REF: 9bc3319fe30d747921f27206ba6d5a5193f29894

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOFI_NODE_DIR: lofi-node-checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: FelineStateMachine/lofi-node
          ref: ${{ env.LOFI_NODE_REF }}
          path: lofi-node-checkout
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Generate API references, /node docs, and llms.txt pairs
        run: deno task site:gen
      - name: Install site dependencies
        run: npm ci --prefix website
      - name: Build site (fails on broken links)
        run: npm run build --prefix website
      - name: Upload site build
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: website/build
          retention-days: 1

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    # the Cloudflare credentials live as secrets on the `dev` environment; a job
    # must declare that environment for them to resolve
    environment:
      name: dev
      url: https://lofi.host
    steps:
      - name: Download site build
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site-build
      # wrangler runs via npx (npm cache) rather than wrangler-action: the action
      # installs wrangler with `npm i` into the checkout, and npm cannot graft
      # onto the Deno-managed node_modules layout at the repo root.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! npx --yes wrangler@4 pages project list | grep -q "lofi-host"; then
            npx --yes wrangler@4 pages project create lofi-host --production-branch=main
          fi
          npx --yes wrangler@4 pages deploy site-build --project-name=lofi-host --branch=main
